---
# Copy this file to k8s/secret.yaml and fill in real values, then:
#   kubectl apply -f k8s/secret.yaml
#
# k8s/secret.yaml is gitignored. NEVER commit it.
#
# stringData is plain text at apply time; k8s base64-encodes it for you.
# No need to run `echo -n ... | base64` manually.
apiVersion: v1
kind: Secret
metadata:
  name: sketchmyinfra-secret
type: Opaque
stringData:
  # Postgres
  POSTGRES_PASSWORD: "CHANGE_ME_localdev_is_fine_for_dev"

  # Full SQLAlchemy URL — must match POSTGRES_PASSWORD above.
  # Hostname "postgres" is the in-cluster Service name from k8s/postgres.yaml.
  DATABASE_URL: "postgresql+asyncpg://smi:CHANGE_ME_localdev_is_fine_for_dev@postgres:5432/sketchmyinfra"

  # JWT signing key — generate with:
  #   python3 -c "import secrets; print(secrets.token_hex(32))"
  JWT_SECRET: "CHANGE_ME_generate_a_random_32_byte_hex"

  # Gemini
  GEMINI_API_KEY: "your-gemini-api-key"

  # Google OAuth (from https://console.cloud.google.com/apis/credentials)
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""

  # GitHub OAuth (from https://github.com/settings/developers)
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
