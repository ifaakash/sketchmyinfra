---
# PRODUCTION secrets template — namespace: prod.
#
# 1. Copy this file:   cp k8s/prod/secret.example.yaml k8s/prod/secret.yaml
# 2. Fill in every value below.
# 3. Apply:            kubectl apply -f k8s/prod/secret.yaml
#
# k8s/prod/secret.yaml is gitignored. NEVER commit it.
# stringData is plain text; Kubernetes base64-encodes it for you.
apiVersion: v1
kind: Secret
metadata:
  name: sketchmyinfra-secret
  namespace: prod
type: Opaque
stringData:
  # Postgres
  POSTGRES_PASSWORD: "CHANGE_ME_strong_prod_password"

  # Full SQLAlchemy async URL — must match POSTGRES_PASSWORD above.
  # "postgres" resolves to the postgres Service within the prod namespace.
  DATABASE_URL: "postgresql+asyncpg://smi:CHANGE_ME_strong_prod_password@postgres:5432/sketchmyinfra"

  # JWT signing key — generate with:
  #   python3 -c "import secrets; print(secrets.token_hex(32))"
  # Use a DIFFERENT key from dev so dev sessions never work on prod.
  JWT_SECRET: "CHANGE_ME_generate_a_different_key_from_dev"

  # Gemini (can reuse dev key if on the same GCP project)
  GEMINI_API_KEY: "your-gemini-api-key"

  # Google OAuth — create a SEPARATE OAuth app for prod at:
  #   https://console.cloud.google.com/apis/credentials
  # Authorised redirect URI: https://sketchmyinfra.com/api/auth/google/callback
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""

  # GitHub OAuth — create a SEPARATE OAuth app for prod at:
  #   https://github.com/settings/developers
  # Callback URL: https://sketchmyinfra.com/api/auth/github/callback
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
