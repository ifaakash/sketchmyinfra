---
# Dev ingress — routes dev.sketchmyinfra.com only (default namespace).
# Prod ingress lives in k8s/prod/ingress.yaml (prod namespace).
#
# No TLS block: Cloudflare Tunnel proxies plain HTTP to Traefik's `web`
# entrypoint. Traffic between the Pi5 and Cloudflare is encrypted by the
# tunnel itself.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sketchmyinfra-dev
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: dev.sketchmyinfra.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sketchmyinfra-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sketchmyinfra-frontend
                port:
                  number: 80
