<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Draw — SketchMyInfra</title>
  <meta name="description" content="Freehand whiteboard for sketching infrastructure diagrams. Shapes, text, arrows and more — powered by Excalidraw." />
  <link rel="canonical" href="https://sketchmyinfra.com/draw/" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/assets/favicon-32.png" type="image/png" sizes="32x32" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #070f20;
      color: #e5e7eb;
      height: 100vh;
      overflow: hidden;
    }
    .navbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      background: rgba(7, 15, 32, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(26, 52, 100, 0.5);
      position: relative;
      z-index: 100;
      transition: background 0.3s, border-color 0.3s;
    }
    .navbar[data-theme="light"] {
      background: rgba(255, 255, 255, 0.85);
      border-bottom-color: rgba(229, 231, 235, 0.7);
    }
    .navbar a {
      text-decoration: none;
      color: #9ca3af;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.15s;
    }
    .navbar a:hover { color: #fff; }
    .navbar[data-theme="light"] a { color: #6b7280; }
    .navbar[data-theme="light"] a:hover { color: #111827; }
    .navbar .active { color: #818cf8; font-weight: 600; }
    .navbar[data-theme="light"] .active { color: #4f46e5; }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      color: #f3f4f6;
      font-size: 1.125rem;
      font-weight: 700;
      transition: color 0.3s;
    }
    .navbar[data-theme="light"] .nav-logo { color: #111827; }
    .logo-box {
      width: 2rem;
      height: 2rem;
      background: #4f46e5;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-links { display: flex; align-items: center; gap: 1.5rem; }
    #excalidraw-root { height: calc(100vh - 56px); width: 100%; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="logo-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M6 18l1.5-4.5L11 17l-5 1z" fill="#fbbf24"/>
          <path d="M7.5 13.5l7.5-7.5 3 3-7.5 7.5z" fill="white" opacity="0.9"/>
          <circle cx="18" cy="6" r="2.5" fill="#34d399" opacity="0.85"/>
          <circle cx="6" cy="6" r="2" fill="#818cf8" opacity="0.7"/>
          <line x1="8" y1="6" x2="15.5" y2="6" stroke="white" stroke-width="0.8" opacity="0.4"/>
        </svg>
      </div>
      SketchMyInfra
    </a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/#gallery">Gallery</a>
      <span class="active">Draw</span>
      <a href="/about/">About</a>
    </div>
  </nav>

  <div id="excalidraw-root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
