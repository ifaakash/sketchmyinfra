<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Draw — SketchMyInfra</title>
  <meta name="description" content="Freehand whiteboard for sketching infrastructure diagrams. Shapes, text, arrows and more — powered by Excalidraw." />
  <link rel="canonical" href="https://sketchmyinfra.com/draw/" />
  <link rel="icon" href="/assets/favicon.ico" />

  <!-- Tailwind (CDN, matches the rest of the site) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 600: '#4f46e5', 700: '#4338ca' },
          },
        },
      },
    };
  </script>

  <!-- Fonts (match site) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; }
    #excalidraw-root { height: calc(100vh - 64px); width: 100%; }
  </style>
</head>
<body class="h-full bg-white">

  <!-- Navbar — lightweight copy matching the main site -->
  <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur border-b border-gray-200" style="height:64px">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 text-lg font-bold text-gray-900">
        <img src="/assets/logo.svg" alt="" class="h-7 w-7" onerror="this.style.display='none'" />
        SketchMyInfra
      </a>
      <div class="flex items-center gap-4">
        <a href="/" class="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">Home</a>
        <a href="/#gallery" class="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">Gallery</a>
        <span class="text-sm font-semibold text-brand-600">Draw</span>
        <a href="/about/" class="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">About</a>
      </div>
    </div>
  </nav>

  <div id="excalidraw-root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
