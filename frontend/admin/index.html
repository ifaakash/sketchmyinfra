<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — SketchMyInfra</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #0f172a; color: #e2e8f0; padding: 24px; line-height: 1.5;
    }
    h1 { font-size: 1.5rem; margin-bottom: 16px; color: #38bdf8; }
    h2 { font-size: 1.1rem; margin: 24px 0 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }

    .auth-bar {
      display: flex; gap: 8px; align-items: center; margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .auth-bar input {
      padding: 8px 12px; border: 1px solid #334155; border-radius: 6px;
      background: #1e293b; color: #e2e8f0; font-family: monospace; font-size: 0.9rem;
      width: 300px;
    }
    .auth-bar input::placeholder { color: #64748b; }
    button {
      padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
      font-size: 0.9rem; font-weight: 600; transition: background 0.2s;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #334155; cursor: not-allowed; }

    .status-msg { font-size: 0.85rem; color: #64748b; margin-left: 8px; }
    .status-msg.error { color: #f87171; }

    .cards {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px; margin-bottom: 8px;
    }
    .card {
      background: #1e293b; border: 1px solid #334155; border-radius: 8px;
      padding: 16px; text-align: center;
    }
    .card .value { font-size: 2rem; font-weight: 700; color: #38bdf8; }
    .card .label { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }
    .card.danger .value { color: #f87171; }
    .card.warning .value { color: #fbbf24; }
    .card.success .value { color: #4ade80; }

    table {
      width: 100%; border-collapse: collapse; font-size: 0.85rem;
      background: #1e293b; border-radius: 8px; overflow: hidden;
    }
    th {
      text-align: left; padding: 10px 12px; background: #334155; color: #94a3b8;
      font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em;
    }
    td { padding: 10px 12px; border-top: 1px solid #1e293b; }
    tr:nth-child(even) { background: #162032; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 0.75rem; font-weight: 600;
    }
    .badge.gemini_error { background: #7f1d1d; color: #fca5a5; }
    .badge.autofix_failed { background: #78350f; color: #fde68a; }
    .prompt-cell { max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .error-cell { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #f87171; }
    .empty-state { text-align: center; padding: 40px; color: #64748b; }

    #dashboard { display: none; }
  </style>
</head>
<body>
  <h1>SketchMyInfra Admin</h1>

  <div class="auth-bar">
    <input type="password" id="apiKey" placeholder="Enter admin API key" autocomplete="off">
    <button class="btn-primary" id="fetchBtn" onclick="fetchStats()">Fetch Stats</button>
    <span class="status-msg" id="statusMsg"></span>
  </div>

  <div id="dashboard">
    <h2>Overview</h2>
    <div class="cards">
      <div class="card" id="cardUsers">
        <div class="value" id="totalUsers">-</div>
        <div class="label">Total Users</div>
      </div>
      <div class="card" id="cardTotal">
        <div class="value" id="totalGen">-</div>
        <div class="label">Total Generations</div>
      </div>
      <div class="card" id="card24h">
        <div class="value" id="gen24h">-</div>
        <div class="label">Last 24h</div>
      </div>
      <div class="card" id="card7d">
        <div class="value" id="gen7d">-</div>
        <div class="label">Last 7 Days</div>
      </div>
    </div>

    <h2>Generation Health</h2>
    <div class="cards">
      <div class="card success">
        <div class="value" id="successCount">-</div>
        <div class="label">Successful</div>
      </div>
      <div class="card danger">
        <div class="value" id="geminiErrCount">-</div>
        <div class="label">Gemini Errors</div>
      </div>
      <div class="card warning">
        <div class="value" id="autofixErrCount">-</div>
        <div class="label">Autofix Failed</div>
      </div>
      <div class="card" id="cardRate">
        <div class="value" id="failureRate">-</div>
        <div class="label">Failure Rate</div>
      </div>
    </div>

    <h2>Recent Failures (Last 50)</h2>
    <div id="failuresContainer">
      <div class="empty-state">No data loaded yet.</div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    // Persist key in sessionStorage so refreshes don't lose it
    const savedKey = sessionStorage.getItem('admin_key');
    if (savedKey) $('apiKey').value = savedKey;

    async function fetchStats() {
      const key = $('apiKey').value.trim();
      if (!key) { showStatus('Enter an API key', true); return; }

      const btn = $('fetchBtn');
      btn.disabled = true;
      btn.textContent = 'Loading...';
      showStatus('');

      try {
        const res = await fetch(`/api/admin/stats?key=${encodeURIComponent(key)}`);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        sessionStorage.setItem('admin_key', key);
        const data = await res.json();
        render(data);
        $('dashboard').style.display = 'block';
        showStatus(`Updated ${new Date().toLocaleTimeString()}`);
      } catch (e) {
        showStatus(e.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Fetch Stats';
      }
    }

    function showStatus(msg, isError) {
      const el = $('statusMsg');
      el.textContent = msg;
      el.className = 'status-msg' + (isError ? ' error' : '');
    }

    function render(d) {
      $('totalUsers').textContent = d.total_users.toLocaleString();
      $('totalGen').textContent = d.total_generations.toLocaleString();
      $('gen24h').textContent = d.generations_24h.toLocaleString();
      $('gen7d').textContent = d.generations_7d.toLocaleString();
      $('successCount').textContent = d.success_count.toLocaleString();
      $('geminiErrCount').textContent = d.gemini_error_count.toLocaleString();
      $('autofixErrCount').textContent = d.autofix_failed_count.toLocaleString();
      $('failureRate').textContent = d.failure_rate + '%';

      // Color failure rate card
      const rateCard = $('cardRate');
      rateCard.className = 'card ' + (d.failure_rate > 20 ? 'danger' : d.failure_rate > 5 ? 'warning' : 'success');

      if (d.recent_failures.length === 0) {
        $('failuresContainer').innerHTML = '<div class="empty-state">No failures recorded.</div>';
        return;
      }

      let html = '<table><thead><tr><th>Time</th><th>Status</th><th>Prompt</th><th>Error</th></tr></thead><tbody>';
      for (const f of d.recent_failures) {
        const time = new Date(f.created_at).toLocaleString();
        const badge = `<span class="badge ${f.status}">${f.status.replace('_', ' ')}</span>`;
        const prompt = escapeHtml(f.prompt);
        const error = f.error_message ? escapeHtml(f.error_message) : '-';
        html += `<tr>
          <td style="white-space:nowrap">${time}</td>
          <td>${badge}</td>
          <td class="prompt-cell" title="${prompt}">${prompt}</td>
          <td class="error-cell" title="${error}">${error}</td>
        </tr>`;
      }
      html += '</tbody></table>';
      $('failuresContainer').innerHTML = html;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Enter key triggers fetch
    $('apiKey').addEventListener('keydown', e => { if (e.key === 'Enter') fetchStats(); });
  </script>
</body>
</html>
