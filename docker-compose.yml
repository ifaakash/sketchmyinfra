services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: ./backend
    env_file: .env
    expose:
      - "8000"
    entrypoint: ["/bin/sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sketchmyinfra
      POSTGRES_USER: smi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smi -d sketchmyinfra"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  plantuml:
    image: plantuml/plantuml-server:jetty
    environment:
      JAVA_TOOL_OPTIONS: "-DPLANTUML_SECURITY_PROFILE=UNSECURE -Djava.net.preferIPv4Stack=true"
    expose:
      - "8080"
    restart: unless-stopped

volumes:
  pgdata:
